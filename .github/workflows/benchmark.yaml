name: Benchmark

on:
    pull_request: null
    push:
        branches:
            - main
    schedule:
        # every 12 hours
        - cron: '0 */12 * * *'

jobs:
    nikic-php-parser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  coverage: none

            - run: composer install --no-progress --working-dir=nikic-PHP-Parser

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - name: Run benchmark (timed)
              working-directory: nikic-PHP-Parser
              run: |
                  bench() {
                    total=0
                    for i in $(seq 1 5); do
                      start=$(date +%s%3N)
                      "$@" > /dev/null
                      end=$(date +%s%3N)
                      total=$((total + end - start))
                    done
                    echo $((total / 5))
                  }
                  echo "nikic/php-parser (v5)|$(bench taskset -c 0 make run)" > ../single-nikic.txt
                  echo "nikic/php-parser (v5)|$(bench make run)" > ../multi-nikic.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-nikic
                  path: |
                      single-nikic.txt
                      multi-nikic.txt

    ext-ast:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: ast
                  coverage: none

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - name: Run benchmark (timed)
              working-directory: ext-ast
              run: |
                  bench() {
                    total=0
                    for i in $(seq 1 5); do
                      start=$(date +%s%3N)
                      "$@" > /dev/null
                      end=$(date +%s%3N)
                      total=$((total + end - start))
                    done
                    echo $((total / 5))
                  }
                  echo "ext-ast|$(bench taskset -c 0 make run)" > ../single-ext-ast.txt
                  echo "ext-ast|$(bench make run)" > ../multi-ext-ast.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-ext-ast
                  path: |
                      single-ext-ast.txt
                      multi-ext-ast.txt

    z7zmey-php-parser-dev:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - run: go build -o z7zmey-php-parser-dev .
              working-directory: z7zmey-php-parser-dev

            - name: Run benchmark (timed)
              working-directory: z7zmey-php-parser-dev
              run: |
                  bench() {
                    total=0
                    for i in $(seq 1 5); do
                      start=$(date +%s%3N)
                      "$@" > /dev/null
                      end=$(date +%s%3N)
                      total=$((total + end - start))
                    done
                    echo $((total / 5))
                  }
                  echo "z7zmey/php-parser|$(bench taskset -c 0 make run)" > ../single-z7zmey.txt
                  echo "z7zmey/php-parser|$(bench make run)" > ../multi-z7zmey.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-z7zmey-php-parser-dev
                  path: |
                      single-z7zmey.txt
                      multi-z7zmey.txt

    halleck45-go-php-parser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Install musl toolchain
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            # The module ships no prebuilt native libs; fetch the musl build-time
            # artifacts (libphp.a, libastbridge.a, PHP embed headers) into the
            # local module copy referenced by the relative `replace` in go.mod.
            - name: Prepare go-php-parser native libs
              working-directory: halleck45-go-php-parser
              run: |
                  rm -rf .halleck-src
                  git clone --depth 1 https://github.com/Halleck45/go-php-parser .halleck-src
                  curl -sL -o musl.tgz https://github.com/Halleck45/go-php-parser/releases/download/v0.1.0/prebuilt-linux_amd64_musl.tar.gz
                  tar xzf musl.tgz -C .halleck-src
                  rm musl.tgz

            - name: Build
              working-directory: halleck45-go-php-parser
              run: |
                  INC="$(pwd)/.halleck-src/prebuilt/linux_amd64_musl/include/php"
                  GOFLAGS=-mod=mod CC=musl-gcc CGO_ENABLED=1 \
                    CGO_CFLAGS="-I$INC -I$INC/main -I$INC/Zend -I$INC/TSRM -I$INC/sapi/embed -I$INC/ext -I$INC/ext/date/lib" \
                    go build -tags musl -o halleck45-go-php-parser .

            - name: Run benchmark (timed)
              working-directory: halleck45-go-php-parser
              run: |
                  # warm-up: fetch runtime libs into v1/prebuilt (cached for later runs)
                  ./halleck45-go-php-parser ../laravel > /dev/null
                  bench() {
                    total=0
                    for i in $(seq 1 5); do
                      start=$(date +%s%3N)
                      "$@" > /dev/null
                      end=$(date +%s%3N)
                      total=$((total + end - start))
                    done
                    echo $((total / 5))
                  }
                  echo "halleck45/go-php-parser|$(bench taskset -c 0 make run)" > ../single-halleck45.txt
                  echo "halleck45/go-php-parser|$(bench make run)" > ../multi-halleck45.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-halleck45-go-php-parser
                  path: |
                      single-halleck45.txt
                      multi-halleck45.txt

    mago-syntax:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - name: Build
              working-directory: mago-syntax
              run: cargo build --release

            - name: Run benchmark (timed)
              working-directory: mago-syntax
              run: |
                  ./target/release/mago-syntax-bench parallel ../laravel > /dev/null
                  bench() {
                    total=0
                    for i in $(seq 1 5); do
                      start=$(date +%s%3N)
                      "$@" > /dev/null
                      end=$(date +%s%3N)
                      total=$((total + end - start))
                    done
                    echo $((total / 5))
                  }
                  # single-core table: single-threaded mode pinned to one core
                  echo "mago-syntax (single-threaded)|$(bench taskset -c 0 make run-single)" > ../single-mago.txt
                  # all-core table: parallel mode (rayon across all cores)
                  echo "mago-syntax (parallel)|$(bench make run)" > ../multi-mago.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-mago-syntax
                  path: |
                      single-mago.txt
                      multi-mago.txt

    dump-nikic:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  coverage: none

            - run: composer install --no-progress --working-dir=nikic-PHP-Parser

            - name: Dump sample class AST
              working-directory: nikic-PHP-Parser
              run: |
                  {
                    echo "## nikic/php-parser (v5) — sample class AST"
                    echo ""
                    echo '```'
                    make dump
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    dump-ext-ast:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: ast
                  coverage: none

            - name: Dump sample class AST
              working-directory: ext-ast
              run: |
                  {
                    echo "## ext-ast — sample class AST"
                    echo ""
                    echo '```'
                    make dump
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    dump-z7zmey:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - run: go build -o z7zmey-php-parser-dev .
              working-directory: z7zmey-php-parser-dev

            - name: Dump sample class AST
              working-directory: z7zmey-php-parser-dev
              run: |
                  {
                    echo "## z7zmey/php-parser — sample class AST"
                    echo ""
                    echo '```'
                    make dump
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    dump-halleck45:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Install musl toolchain
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Prepare go-php-parser native libs
              working-directory: halleck45-go-php-parser
              run: |
                  rm -rf .halleck-src
                  git clone --depth 1 https://github.com/Halleck45/go-php-parser .halleck-src
                  curl -sL -o musl.tgz https://github.com/Halleck45/go-php-parser/releases/download/v0.1.0/prebuilt-linux_amd64_musl.tar.gz
                  tar xzf musl.tgz -C .halleck-src
                  rm musl.tgz

            - name: Build
              working-directory: halleck45-go-php-parser
              run: |
                  INC="$(pwd)/.halleck-src/prebuilt/linux_amd64_musl/include/php"
                  GOFLAGS=-mod=mod CC=musl-gcc CGO_ENABLED=1 \
                    CGO_CFLAGS="-I$INC -I$INC/main -I$INC/Zend -I$INC/TSRM -I$INC/sapi/embed -I$INC/ext -I$INC/ext/date/lib" \
                    go build -tags musl -o halleck45-go-php-parser .

            - name: Dump sample class AST
              working-directory: halleck45-go-php-parser
              run: |
                  {
                    echo "## halleck45/go-php-parser — sample class AST"
                    echo ""
                    echo '```'
                    make dump
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    dump-mago:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Build
              working-directory: mago-syntax
              run: cargo build --release

            - name: Dump sample class AST
              working-directory: mago-syntax
              run: |
                  {
                    echo "## mago-syntax — sample class AST"
                    echo ""
                    echo '```'
                    make dump
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    summary-single:
        runs-on: ubuntu-latest
        needs:
            - nikic-php-parser
            - ext-ast
            - z7zmey-php-parser-dev
            - halleck45-go-php-parser
            - mago-syntax
        steps:
            - uses: actions/download-artifact@v4
              with:
                  pattern: duration-*
                  merge-multiple: true
                  path: durations

            - name: Render single-core table
              run: |
                  data=$(find durations -name 'single-*.txt' -exec cat {} +)
                  max=$(printf '%s\n' "$data" | sort -t'|' -k2 -nr | head -1 | cut -d'|' -f2)
                  {
                    echo "## Benchmark results — single core"
                    echo ""
                    echo "Average wall-clock time over 5 runs, each parser pinned to **one CPU core** (\`taskset -c 0\`), parsing the full Laravel framework corpus (\`src/\` + all Composer \`vendor/\` dependencies). Slowest first; \"vs slowest\" is how many times faster than the slowest parser."
                    echo ""
                    echo '```'
                    {
                      printf 'Rank|Parser|Avg (5 runs)|vs slowest\n'
                      rank=0
                      printf '%s\n' "$data" | sort -t'|' -k2 -nr | while IFS='|' read -r name ms; do
                        rank=$((rank + 1))
                        ratio=$(awk -v m="$max" -v x="$ms" 'BEGIN{printf "%.1fx", m/x}')
                        printf '%s|%s|%s ms|%s\n' "$rank" "$name" "$ms" "$ratio"
                      done
                    } | column -t -s'|' -o ' | ' -R 1,3,4
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    summary-all-cores:
        runs-on: ubuntu-latest
        needs:
            - nikic-php-parser
            - ext-ast
            - z7zmey-php-parser-dev
            - halleck45-go-php-parser
            - mago-syntax
        steps:
            - uses: actions/download-artifact@v4
              with:
                  pattern: duration-*
                  merge-multiple: true
                  path: durations

            - name: Render all-core table
              run: |
                  data=$(find durations -name 'multi-*.txt' -exec cat {} +)
                  max=$(printf '%s\n' "$data" | sort -t'|' -k2 -nr | head -1 | cut -d'|' -f2)
                  {
                    echo "## Benchmark results — all cores"
                    echo ""
                    echo "Average wall-clock time over 5 runs with **all runner cores available** (no pinning), parsing the full Laravel framework corpus (\`src/\` + all Composer \`vendor/\` dependencies). Only multi-threaded parsers (mago-syntax parallel) gain here; single-threaded parsers match their single-core number. Slowest first; \"vs slowest\" is how many times faster than the slowest parser."
                    echo ""
                    echo '```'
                    {
                      printf 'Rank|Parser|Avg (5 runs)|vs slowest\n'
                      rank=0
                      printf '%s\n' "$data" | sort -t'|' -k2 -nr | while IFS='|' read -r name ms; do
                        rank=$((rank + 1))
                        ratio=$(awk -v m="$max" -v x="$ms" 'BEGIN{printf "%.1fx", m/x}')
                        printf '%s|%s|%s ms|%s\n' "$rank" "$name" "$ms" "$ratio"
                      done
                    } | column -t -s'|' -o ' | ' -R 1,3,4
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"
